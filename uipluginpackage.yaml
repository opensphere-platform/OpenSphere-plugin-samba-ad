# Samba-AD independent plugin package.
# The image digest, manifest digest, and trust key are administrator-approved
# trust pins. The plugin is mounted inside the Foundation host and is not
# exposed as a first-level main-shell navigation item.
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: samba-ad
  namespace: opensphere-console
  labels:
    opensphere.io/host-ref: foundation
spec:
  kind: plugin
  hostRef: foundation
  hostApiVersion: "1.0.0"
  hostCompat: ">=1.0.0 <2.0.0"
  displayName: "Samba-AD"
  owner: platform-foundation
  version: 0.1.1-edge.4
  description: "Workspace directory management plugin for Samba AD DC, mounted inside Foundation."
  serviceAccountName: opensphere-plugin-samba-ad
  image:
    repository: ghcr.io/opensphere-platform/opensphere-plugin-samba-ad
    digest: sha256:cbf48c5e3e96b65657b722b36f4a0abe333ae9a7e86a9f3222c557bb31106bad
  nav:
    band: "Operate"
    label: "Samba-AD"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "8adc69e13af3ab6a72b6f1bbfef823709dd0589d93a652d90c1acc6669ce780e"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v4
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - api:proxy
    - manual:contribute
  api:
    basePath: /api/plugins/samba-ad
  cli:
    namespace: ad
    manifestPath: /cli/manifest
  contributions:
    page: { enabled: false, reason: "Mounted inside the Foundation subShell" }
    navigation: { enabled: false, mode: none, reason: "Foundation owns the child navigation" }
    api: { enabled: true, basePath: /api/plugins/foundation }
    cli: { enabled: true, namespace: ad, manifestPath: /cli/manifest }
    manual: { enabled: true, sourceId: plugin:samba-ad, mode: runtime }
    search: { enabled: true, mode: index }
    notification: { enabled: true, frontend: false, backend: true }
    observability: { enabled: true, logs: true, metrics: true, traces: false }
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: samba-ad
  namespace: opensphere-console
spec:
  packageRef:
    name: samba-ad
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: true
    exposeInNavigation: false
  approval:
    requestedBy: cmars
    reason: "Samba-AD independent plugin mounted inside Foundation."
