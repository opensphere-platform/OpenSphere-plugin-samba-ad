# Samba-AD — 독립 plugin(D1 승격, 2026-07-06). 폴더=컨테이너=신뢰·서명 경계(OpenSphere-plugin-* 규약).
# kind=plugin, hostRef=foundation(manifest) — 콘솔 DUPA 신뢰체인(이중 서명검증)으로 적재되되
# registerPage 미호출로 mainShell 1단에 비노출, Foundation(host)이 안층에서 <osp-samba-ad> 마운트.
# digest/sha256/keyId는 관리자 승인값 = 신뢰 루트(S1: digest는 sha256 필수 — CRD pattern 강제).
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: samba-ad
  namespace: opensphere-system
  labels: { opensphere.io/host-ref: foundation }
spec:
  displayName: "Samba-AD"
  owner: platform-foundation
  version: 0.1.0
  description: "workspace/사원 디렉터리(Samba AD DC) 관리 plugin — Foundation 안층 마운트(hostRef=foundation)"
  serviceAccountName: opensphere-plugin-samba-ad   # rbac.yaml — 전용 SA 최소권한(읽기)
  image:
    repository: ghcr.io/opensphere-platform/plugin-samba-ad
    digest: sha256:7e3eb020d00c33629e82eb66ccc20603487ffed2844842a87e654502d9393263  # bk1 — 백업 override
  nav:
    band: "운영 Operate"
    label: "Samba-AD"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "9afe905d85c550bc7822bbe04d78d0bef97da7619b41aa9724403065ab040c5a"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v2
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - page:register
    - api:proxy
    - manual:contribute
  api:
    basePath: /api/plugins/samba-ad
  # cli:contribute(2026-07-06) — os CLI에 'ad' 명령 네임스페이스 기여(headless binding).
  #   registry가 광고 → os가 <console>/api/plugins/samba-ad/cli/manifest 조회 → os ad status/describe/events.
  cli:
    namespace: ad
    manifestPath: /cli/manifest
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: samba-ad
  namespace: opensphere-system
spec:
  packageRef:
    name: samba-ad
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: true
    exposeInNavigation: false   # host(Foundation) 안층 표시 — mainShell 1단 비노출(선언적 의도 표기)
  approval:
    requestedBy: cmars
    reason: "D1 승격 — Samba-AD 독립 plugin(hostRef=foundation)"
