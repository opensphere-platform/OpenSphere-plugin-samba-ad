name: Publish Samba AD plugin edge image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - server.js
      - rbac.yaml
      - servicemonitor.yaml
      - ui-shell/**
      - uipluginpackage.yaml
      - package-module.mjs
      - verify.mjs
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: samba-ad-edge-image
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-SDK
          path: OpenSphere-SDK
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build SDK and recreate signed module package
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.DUPA_SIGNING_KEY_PEM }}
          DUPA_SIGNING_KEY_ID: opensphere-plugins-v4
          OPENSPHERE_SDK: ${{ github.workspace }}/OpenSphere-SDK
        run: |
          set -euo pipefail
          printf '%s' "$SIGNING_KEY" > "$RUNNER_TEMP/opensphere-plugins-v4.pem"
          chmod 600 "$RUNNER_TEMP/opensphere-plugins-v4.pem"
          export DUPA_SIGNING_KEY="$RUNNER_TEMP/opensphere-plugins-v4.pem"
          npm --prefix OpenSphere-SDK install --no-audit --no-fund
          npm --prefix OpenSphere-SDK run build
          node package-module.mjs
          node verify.mjs
      - id: package
        shell: bash
        run: |
          echo "descriptor=$(jq -c . module-package.json)" >> "$GITHUB_OUTPUT"
          echo "signature=$(tr -d '\r\n' < module-package.json.sig)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/opensphere-platform/opensphere-plugin-samba-ad
          tags: type=sha,prefix=sha-
          labels: |
            io.opensphere.channel=edge
            io.opensphere.source-revision=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OS_MODULE_DESCRIPTOR=${{ steps.package.outputs.descriptor }}
            OS_MODULE_SIGNATURE=${{ steps.package.outputs.signature }}
          provenance: mode=max
          cache-from: type=gha,scope=opensphere-plugin-samba-ad
          cache-to: type=gha,mode=max,scope=opensphere-plugin-samba-ad
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/opensphere-platform/opensphere-plugin-samba-ad
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ghcr.io/opensphere-platform/opensphere-plugin-samba-ad@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ runner.temp }}/opensphere-plugin-samba-ad.spdx.json
          upload-artifact: false
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/opensphere-platform/opensphere-plugin-samba-ad
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ runner.temp }}/opensphere-plugin-samba-ad.spdx.json
          push-to-registry: true
      - uses: imjasonh/setup-crane@v0.4
      - name: Advance edge and verify
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          crane auth login ghcr.io -u "opensphere-platform" -p "$GHCR_TOKEN"
          repository=ghcr.io/opensphere-platform/opensphere-plugin-samba-ad
          crane tag "$repository@$DIGEST" edge
          test "$(crane digest "$repository:edge")" = "$DIGEST"
